# On-policy distillation (OPD): BC warmup on full expert data, then RL with frozen teacher.
# Runner saves the post-BC adapter to `logger.log_path/opd_bc_teacher/actor` (frozen teacher)
# and sets `algorithm.opd_teacher_model_path` to that path before the main loop.
# Before RL, the student is re-initialized from `actor.checkpoint_load_path` (see EmbodiedRunner).
#
# Batch sizing:
#   RL: tune rollout env batch (group_size × num_group_envs × rollout_epoch × …) vs
#       actor.global_batch_size / num_actor_gpus (see embodied_runner + fsdp_actor_worker).
#   OPD BC warmup: LiberoSFT uses algorithm.opd_bc_batch_size (per GPU). Each BC optimizer step
#       uses global samples = algorithm.opd_bc_global_batch_size (if set) else actor.global_batch_size,
#       with grad accumulation = that_global / (opd_bc_batch_size × num_actor_gpus).

defaults:
  - env/train: libero_spatial
  - env/eval: libero_spatial
  - override hydra/job_logging: stdout

hydra:
  run:
    dir: .
  output_subdir: null
  searchpath:
    - file://${oc.env:EMBODIED_PATH}/config/

cluster:
  num_nodes: 1
  component_placement:
    actor,env,rollout: all
  ray_object_store_memory: 34359738368  # 32 GiB

runner:
  task_type: embodied
  # tqdm bars (rollout / BC / policy update). Set false for quieter Slurm logs.
  show_progress_bar: true
  # One-line train metrics after each policy update (actor/*).
  log_training_step_summary: true
  # Per-tensor shape spam during run_training (debug only).
  log_training_tensor_shapes: false
  logger:
    log_path: "../results"
    project_name: rlinf
    # Default run name; sequential launcher overrides with opd_<task>_<seed>_... (see EXPERIMENT_NAME_PREFIX).
    experiment_name: "opd_spatial_openvla"
    logger_backends: ["wandb"]

  max_epochs: 50
  max_steps: -1

  only_eval: False
  val_check_interval: -1
  save_interval: 50
  seq_length: 4096
  max_prompt_length: 128

algorithm:
  auto_reset: False
  ignore_terminations: False
  use_fixed_reset_state_ids: True
  require_values: False
  shuffle_samples: True
  # OPD: per-token margin (teacher_lp - student_lp); with True, GRPO-style group norm
  # over trajectory scores (sum of masked margins per env, then mean/std within group).
  normalize_advantages: False
  kl_penalty: kl
  group_size: 4
  n_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  n_eval_chunk_steps: ${int_div:${env.train.max_episode_steps}, ${actor.model.num_action_chunks}}
  num_group_envs: 8
  rollout_epoch: 1
  eval_rollout_epoch: 20
  reward_type: step_level
  logprob_type: token_level
  entropy_type: token_level

  use_experience_replay: False
  # Auxiliary BC term mixed into the *RL* loss when use_experience_replay (or similar) is on.
  # OPD teacher BC uses actor.optim.opd_teacher_* only. Keep 0 here for standard OPD.
  bc_coeff: 0.0
  adv_type: embodied_opd
  # OPD actor loss options:
  #   - embodied_opd            : GRPO/PPO-style clipped ratio objective
  #   - embodied_opd_reinforce  : plain REINFORCE-style objective
  loss_type: embodied_opd
  loss_agg_func: "token-mean"
  kl_beta: 0.0
  entropy_bonus: 0
  clip_ratio_high: 0.28
  clip_ratio_low: 0.2
  clip_ratio_c: 3.0
  value_clip: 0.2
  huber_delta: 10.0

  gamma: 0.99
  gae_lambda: 0.95

  # --- OPD ---
  # BC warmup runs after the actor inits, before rollout/env (Libero). RL rollouts start only in run().
  # BC warmup uses actor.optim.opd_teacher_lr / opd_teacher_value_lr; RL uses lr / value_lr (restored after BC).
  # If rl_teacher=True, teacher warmup is done with pure GRPO rollout training (same training hyperparameters
  # as student), and opd_bc_* controls are ignored.
  rl_teacher: false
  # Checkpoint after BC: teacher log_path/opd_bc_teacher/actor. If MuJoCo/EGL segfaults on env init, try
  # RLINF_LIBERO_USE_OSMESA=1 (see examples/embodiment/run_embodiment.sh).
  opd_bc_steps: 600
  # <=0 uses all demos per task in LiberoSFTDataset (full data per task).
  opd_sft_demos_per_task: 0
  # Use preprocessed RLDS->HDF5 demos for OPD BC warmup (under LIBERO/libero/datasets/<name>).
  sft_dataset_task_suite_name: libero_spatial_256_from_rlds_reverted
  # Total expert samples per BC optimizer step (overrides actor.global_batch_size for warmup only).
  opd_bc_global_batch_size: 256
  # Per-GPU LiberoSFT microbatch during BC. Must satisfy:
  #   opd_bc_global_batch_size % (opd_bc_batch_size × num_actor_gpus) == 0
  # e.g. global 32 @ 8 GPUs → opd_bc_batch_size 4 (or 2 with grad_acc2). Single GPU: keep 32.
  opd_bc_batch_size: 32
  # Optional: override base HF dir when teacher path is adapter-only (default: actor.checkpoint_load_path).
  # opd_teacher_base_model_path: null
  # Optional: initialize BC teacher warmup from an explicit checkpoint directory
  # (adapter_model.bin for LoRA, or model.pt for full-model). If null, BC starts from
  # actor.checkpoint_load_path.
  # opd_teacher_init_model_path: null
  # Set manually to skip BC warmup and use an existing teacher (adapter dir or full model dir).
  # opd_teacher_model_path: null
  # After BC, sync actor→rollout and run evaluate() on the current training task(s) only.
  # Post-training eval from run_embodiment_sequential.sh / run_embodiment_opd_sequential.sh uses
  # env.fixed_task_ids=null (full suite, e.g. 10 tasks for spatial); see EVAL_HYDRA_OVERRIDES there.
  opd_eval_teacher_after_bc: True
  # If true (default), rollout worker runs the frozen teacher on each chunk (same obs + student actions)
  # and sends teacher_logprobs with the batch—no second full teacher pass on the actor. Needs extra VRAM
  # on rollout GPUs (student + teacher). Set false to keep the old actor-side teacher scoring.
  opd_precompute_teacher_in_rollout: true
  # Teacher forward during compute_advantages (OPD): microbatch size; can exceed actor.micro_batch_size
  # if VRAM allows (teacher-only forward, no student grads).
  # opd_teacher_micro_batch_size: 32
  # Only if GPU OOM: set true to stage logprobs on CPU (much slower, looks like idle GPU).
  # opd_teacher_stash_logprobs_on_cpu: false

  sampling_params:
    use_greedy: False
    temperature_train: 1.6
    temperature_eval: 1.6
    top_k: -1
    top_p: 1.0
    repetition_penalty: 1.0

  length_params:
    max_new_token: null
    max_length: 1024
    min_length: 1

  filter_rewards: False

env:
  group_name: "EnvGroup"
  channel:
    name: "env_buffer_list"
    queue_name: "obs_buffer"
    queue_size: 0
  eval:
    num_envs: 16
    eval_per_task: ${int_div:${env.eval.num_envs}, 10}
  enable_offload: False
  fixed_task_ids: null

rollout:
  group_name: "RolloutGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "action_buffer"
    queue_size: 0
  mode: "colocate"
  generation_backend: "huggingface"
  model_dir: "${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-spatial-traj1/"
  enable_offload: True
  pipeline_stage_num: 1

actor:
  group_name: "ActorGroup"
  channel:
    name: ${env.channel.name}
    queue_name: "replay_buffer"
    queue_size: 0
  training_backend: "fsdp"
  checkpoint_load_path: "${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-spatial-traj1/"
  # RL training: per-GPU microbatch and global token/sample count per step (all actor GPUs).
  micro_batch_size: 32
  global_batch_size: 2048 # was 8192
  seed: 1234
  enable_offload: True
  preallocate: 0

  model:
    model_name: "openvla_oft"
    value_type: ${algorithm.reward_type}
    action_dim: 7
    num_action_chunks: 8
    use_proprio: False
    unnorm_key: libero_spatial_no_noops
    center_crop: True

    precision: "bf16"
    add_bias_linear: False
    add_qkv_bias: True
    vocab_size: 32000
    hidden_size: 4096
    policy_setup: "widowx_bridge"
    vh_mode: "a0"
    image_size: [224, 224]
    is_lora: True
    lora_rank: 32
    partial_finetune: False
    layers_to_train: 50
    num_images_in_input: 1
    attn_implementation: "flash_attention_2"
    low_cpu_mem_usage: True
    trust_remote_code: True
    gradient_checkpointing: False

  optim:
    # Student / RL phase (after OPD BC warmup).
    lr: 2.0e-5
    value_lr: 3.0e-3
    # Teacher: BC-only warmup. Omit to reuse lr / value_lr for BC as well.
    opd_teacher_lr: 2.0e-5
    opd_teacher_value_lr: 3.0e-3
    adam_beta1: 0.9
    adam_beta2: 0.999
    adam_eps: 1.0e-05
    clip_grad: 1.0

  tokenizer:
    tokenizer_type: "HuggingFaceTokenizer"
    tokenizer_model: "${oc.env:REPO_PATH}/model/Openvla-oft-SFT-libero-spatial-traj1/"
    use_fast: False
    trust_remote_code: True
    padding_side: "right"

reward:
  use_reward_model: False

critic:
  use_critic_model: False
